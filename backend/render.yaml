services:
  - type: web
    name: interview-simulator-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false  # Set this in Render dashboard
      - key: GEMINI_API_KEY_1
        sync: false  # Primary Gemini key — set in Render dashboard
      - key: GEMINI_API_KEY_2
        sync: false  # Second Gemini key — optional, for rotation
      - key: GEMINI_API_KEY_3
        sync: false  # Third Gemini key — optional, for rotation
      - key: GEMINI_API_KEY_4
        sync: false  # Fourth Gemini key — optional, for rotation
      - key: GOOGLE_TTS_API_KEY
        sync: false  # Optional — set in Render dashboard
      - key: FRONTEND_URL
        sync: false  # Your Vercel URL
    healthCheckPath: /api/health
